<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pegelköpp</title>
<link href="/fonts.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f14;--bg2:#17171f;--bg3:#1e1e28;--card:#22222e;--card2:#2a2a38;
  --ac:#e8b84b;--ac2:#f5d37a;--red:#e05252;--grn:#4caf7d;--blu:#5b8dee;
  --tX:#e05252;--tO:#5b8dee;--txt:#f0ede6;--mut:#8884a0;--brd:#2e2e3e;
  --fh:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);min-height:100vh;font-size:15px}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.topbar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-logo{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.pg-logo{font-family:'Pirata One',serif;font-size:34px;color:var(--ac);line-height:1;letter-spacing:.03em}
.topbar-sub{font-size:10px;color:var(--mut);font-weight:500;text-transform:uppercase;letter-spacing:.12em}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);overflow-x:auto}
.tab{flex:1;min-width:58px;padding:12px 2px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;color:var(--mut);text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.pg{flex:1;padding:16px;display:none}.pg.active{display:block}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-family:var(--fb);font-size:14px;font-weight:600;transition:all .18s}
.bp{background:var(--ac);color:#0f0f14}.bp:hover{background:var(--ac2)}
.bg{background:transparent;color:var(--mut);border:1px solid var(--brd)}.bg:hover{border-color:var(--ac);color:var(--ac)}
.bd{background:transparent;color:var(--red);border:1px solid var(--red)}.bd:hover{background:#e0525222}
.sm{padding:6px 12px;font-size:12px}
.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:12px}
.stitle{font-family:var(--fh);font-size:20px;letter-spacing:.08em;color:var(--ac);margin-bottom:14px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.bgrn{background:#4caf7d22;color:var(--grn);border:1px solid #4caf7d44}
.bamb{background:#e8b84b22;color:var(--ac);border:1px solid #e8b84b44}
.bgry{background:#88849022;color:var(--mut);border:1px solid #88849044}
.bred{background:#e0525222;color:var(--red);border:1px solid #e0525244}
input,select,textarea{background:var(--bg3);border:1px solid var(--brd);color:var(--txt);padding:10px 14px;border-radius:8px;font-family:var(--fb);font-size:14px;width:100%}
textarea{resize:vertical;min-height:80px;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac)}
label{font-size:12px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.fg{margin-bottom:14px}
.stbl{width:100%;border-collapse:collapse;font-size:13px}
.stbl th{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--brd)}
.stbl td{padding:8px;border-bottom:1px solid #2e2e3e33}
.stbl tr:last-child td{border-bottom:none}
.rnk{font-family:var(--fh);font-size:18px;color:var(--mut);width:28px}
.rnk.gold{color:#f5d37a}
.snum{font-family:var(--fh);font-size:20px;color:var(--ac)}
.sbw{margin-bottom:10px}
.sbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--mut)}
.sbl span:last-child{color:var(--txt);font-weight:600}
.sb{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.sbf{height:100%;border-radius:4px;background:var(--ac);transition:width .5s}
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
.kb{aspect-ratio:1;border-radius:50%;border:2px solid var(--brd);background:var(--bg3);color:var(--mut);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:var(--fh)}
.kb:hover{border-color:var(--ac);color:var(--ac)}
.kb.sel{background:var(--ac);border-color:var(--ac);color:#0f0f14}
.kb.pudel{border-color:#e0525266;color:var(--red)}
.kb.pudel:hover{border-color:var(--red);background:#e0525222}
.kb.pudel.sel{background:var(--red);border-color:var(--red);color:#fff}
.kb:disabled{opacity:.3;cursor:not-allowed}
.uc{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.uc:hover{border-color:var(--ac)}
.uav{width:44px;height:44px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid var(--brd)}
.uinfo{flex:1}.uinfo .nm{font-weight:600;font-size:15px}.uinfo .sub{font-size:12px;color:var(--mut);margin-top:2px}
.chip{background:var(--bg3);border-radius:6px;padding:4px 8px;text-align:center;min-width:48px}
.chip .v{font-family:var(--fh);font-size:18px;color:var(--ac)}.chip .l{font-size:10px;color:var(--mut)}
.chip.pc .v{color:var(--red)}
.wi{background:var(--bg3);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;color:var(--mut)}
.wi strong{color:var(--txt);font-size:15px}
.mo{position:fixed;inset:0;background:#00000088;z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.mo.open{display:flex}
#fb-btn{position:fixed;bottom:20px;right:20px;z-index:99;width:44px;height:44px;border-radius:50%;background:var(--bg2);border:1px solid var(--brd);color:var(--mut);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #0006;transition:border-color .18s,color .18s}
#fb-btn:hover{border-color:var(--ac);color:var(--ac)}
.md{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.md h2{font-size:22px;margin-bottom:16px;color:var(--ac);font-family:var(--fh);letter-spacing:.06em}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}
.empty .icon{font-size:40px;margin-bottom:10px}
.empty p{font-size:14px;line-height:1.6}
.notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--grn);color:#fff;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1}
.egrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.eo{font-size:22px;cursor:pointer;padding:5px;border-radius:8px;border:2px solid var(--brd);transition:all .15s}
.eo.sel{border-color:var(--ac);background:var(--ac)22}
.stc{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;margin-bottom:12px}
.stc.bi{border-left:3px solid var(--mut)}.stc.cu{border-left:3px solid var(--ac)}
.vgt{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.vgtc{border-radius:10px;padding:12px;border:2px solid transparent;transition:all .2s}
.vgtc.tX{background:#e0525218;border-color:#e0525244}
.vgtc.tO{background:#5b8dee18;border-color:#5b8dee44}
.vgtc.tX.at{border-color:var(--tX);box-shadow:0 0 14px #e0525244}
.vgtc.tO.at{border-color:var(--tO);box-shadow:0 0 14px #5b8dee44}
.vgtt{font-family:var(--fh);font-size:20px;letter-spacing:.08em}
.vgtt.X{color:var(--tX)}.vgtt.O{color:var(--tO)}
.vggw{overflow-x:auto;margin-bottom:12px}
.vgg{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;min-width:260px}
.vgch{text-align:center;font-family:var(--fh);font-size:14px;color:var(--mut);padding:4px 0}
.vgc{aspect-ratio:1;border-radius:5px;background:var(--bg3);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:13px;transition:all .3s}
.vgc.X{background:#e0525228;border-color:#e0525266;color:var(--tX)}
.vgc.O{background:#5b8dee28;border-color:#5b8dee66;color:var(--tO)}
.vgc.win{animation:wp .7s ease-in-out infinite alternate}
.vgc.X.win{background:#e0525266;border-color:var(--tX)}
.vgc.O.win{background:#5b8dee66;border-color:var(--tO)}
@keyframes wp{from{transform:scale(1)}to{transform:scale(1.1);opacity:.75}}
.cb{background:var(--bg3);border:1px solid var(--red);border-radius:10px;padding:14px;margin-bottom:12px;display:none}
.cb.show{display:block}
.conn-dot{width:10px;height:10px;border-radius:50%;background:#888;flex-shrink:0}
.conn-dot.green{background:var(--grn)}
.conn-dot.red{background:var(--red)}
.abend-banner{background:var(--bg2);border:1px solid var(--ac);border-left:3px solid var(--ac);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kda-bracket-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;white-space:nowrap;margin-bottom:12px}
.kda-bracket{display:inline-flex;flex-direction:column;padding:16px;vertical-align:top}
.kda-bracket-section{margin-bottom:8px}
.bracket-section-title{font-family:var(--fh);font-size:20px;color:var(--ac);letter-spacing:.08em;margin-bottom:8px}
.bracket-cols{display:flex;gap:16px;align-items:flex-start}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;gap:16px;flex-shrink:0}
.bracket-round-label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;text-align:center}
.bracket-slot{width:140px;min-height:56px;border-radius:8px;background:var(--card);border:1px solid var(--brd);cursor:default;overflow:hidden;flex-shrink:0}
.bracket-slot.active{border-color:var(--ac);background:#e8b84b11;cursor:pointer;min-height:44px}
.bracket-slot.active:active{background:#e8b84b1a}
@media (hover:hover){.bracket-slot.active:hover{background:#e8b84b1a}}
.bracket-slot:focus-visible{outline:2px solid var(--ac);outline-offset:2px}
.bracket-slot.bye{opacity:.45;border-style:dashed}
.bracket-slot-divider{height:1px;background:var(--brd);margin:0}
.bracket-player-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px}
.bracket-player-row.winner-row{background:#4caf7d11}
.bracket-player-row.loser-row{background:#e0525211}
.bracket-player-name{font-size:15px;font-weight:600;font-family:var(--fb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.bracket-player-score{font-family:var(--fh);font-size:15px;flex-shrink:0;margin-left:4px}
.kda-winner-banner{font-family:var(--fh);font-size:32px;color:var(--ac);text-align:center;padding:16px;letter-spacing:.04em}
.kda-wurf-player-section{margin-bottom:16px}
.kda-wurf-avatar{font-size:32px;margin-bottom:4px;text-align:center}
.kda-wurf-player-name{font-size:15px;font-weight:600;text-align:center;margin-bottom:8px}
.kda-wurf-throw-label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.kda-wurf-total{font-family:var(--fh);font-size:24px;color:var(--ac);text-align:center;margin-top:6px}
.kda-wurf-tiebreak-header{font-size:14px;font-weight:600;color:var(--ac);text-align:center;margin:12px 0 8px;padding:8px;background:#e8b84b11;border-radius:6px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="topbar-logo">
    <span class="pg-logo">Pegelköpp</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="tsub" style="font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em">Bereit</span>
    <div class="conn-dot" id="connDot"></div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('spiele')">Spiele</div>
  <div class="tab" onclick="showTab('spielen')">Spielen</div>
  <div class="tab" onclick="showTab('bib')">Bibliothek</div>
  <div class="tab" onclick="showTab('spieler')">Spieler</div>
  <div class="tab" onclick="showTab('stats')">Statistik</div>
</div>
<div class="pg active" id="pg-spiele"><div id="r-spiele"></div></div>
<div class="pg" id="pg-spielen"><div id="r-spielen"></div></div>
<div class="pg" id="pg-bib"><div id="r-bib"></div></div>
<div class="pg" id="pg-spieler">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="stitle" style="margin:0">Spieler</div>
    <button class="btn bp sm" onclick="openM('m-neu-sp')">+ Hinzufügen</button>
  </div>
  <div id="r-spieler"></div>
</div>
<div class="pg" id="pg-stats"><div class="stitle">Statistik</div><div id="r-stats"></div></div>

<div class="mo" id="m-neu-sp"><div class="md">
  <h2>Neuer Spieler</h2>
  <div class="fg"><label>Name</label><input type="text" id="m-sp-name" placeholder="Name..."></div>
  <div class="fg"><label>Emoji</label><div class="egrid" id="m-sp-emoji"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="addSpieler()">Hinzufügen</button>
    <button class="btn bg" onclick="closeM('m-neu-sp')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-sp-detail"><div class="md">
  <div id="m-sp-detail-c"></div>
  <button class="btn bg" style="width:100%;margin-top:12px" onclick="closeM('m-sp-detail')">Schließen</button>
</div></div>

<div class="mo" id="m-st"><div class="md">
  <h2>Neues Spiel</h2>
  <div class="fg"><label>Icon</label><div class="egrid" id="m-st-emoji"></div></div>
  <div class="fg"><label>Name</label><input type="text" id="m-st-name" placeholder="z.B. Hinderniskegeln"></div>
  <div class="fg"><label>Beschreibung</label><textarea id="m-st-desc" placeholder="Regeln..."></textarea></div>
  <div class="fg"><label>Modus</label>
    <select id="m-st-mode"><option value="multi">Mehrspieler</option><option value="teams">Zwei Teams</option></select>
  </div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="saveST()">Hinzufügen</button>
    <button class="btn bg" onclick="closeM('m-st')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-st-det"><div class="md">
  <div id="m-st-det-c"></div>
  <button class="btn bg" style="width:100%;margin-top:12px" onclick="closeM('m-st-det')">Schließen</button>
</div></div>

<div class="mo" id="m-game-det"><div class="md">
  <div id="m-game-det-c"></div>
  <button class="btn bg" style="width:100%;margin-top:12px" onclick="closeM('m-game-det')">Schließen</button>
</div></div>

<div class="mo" id="m-spiel-gen"><div class="md">
  <h2 id="m-gen-title">Spiel starten</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-gen-datum"></div>
  <div id="m-gen-extra"></div>
  <div class="fg"><label>Spieler wählen</label><div id="m-gen-wahl" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startGenSpiel()">Starten</button>
    <button class="btn bg" onclick="closeM('m-spiel-gen')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-vg"><div class="md">
  <h2>🔴 Vier Gewinnt</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-vg-datum"></div>
  <div class="fg"><label>Team X</label><div id="m-vg-x" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div class="fg"><label>Team O</label><div id="m-vg-o" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startVG()">Starten</button>
    <button class="btn bg" onclick="closeM('m-vg')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-fj"><div class="md">
  <h2>🦊 Fuchsjagd</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-fj-datum"></div>
  <div class="fg"><label>Fuchs</label><div id="m-fj-fuchs" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div class="fg"><label>Jäger</label><div id="m-fj-jaeger" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startFJ()">Starten</button>
    <button class="btn bg" onclick="closeM('m-fj')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-anker"><div class="md">
  <h2>⚓ Anker</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-anker-datum"></div>
  <div class="fg"><label>Anzahl Runden</label><input type="number" id="m-anker-runden" value="3" min="1" max="20"></div>
  <div class="fg"><label>Spieler wählen</label><div id="m-anker-wahl" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startAnker()">Starten</button>
    <button class="btn bg" onclick="closeM('m-anker')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-kda"><div class="md">
  <h2>🏆 Kegler des Abends</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-kda-datum"></div>
  <div class="fg"><label>Spieler (min. 4, max. 12)</label><div id="m-kda-wahl" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div><div id="m-kda-counter" style="font-size:12px;color:var(--mut);margin-top:6px;text-align:center">0 Spieler ausgewählt</div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startKDA()">Turnier starten</button>
    <button class="btn bg" onclick="closeM('m-kda')">Abbrechen</button>
  </div>
</div></div>

<div class="mo" id="m-kda-wurf"><div class="md" role="dialog" aria-modal="true" aria-labelledby="m-kda-wurf-title">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div id="m-kda-wurf-title" style="font-family:var(--fh);font-size:20px;color:var(--ac);letter-spacing:.06em"></div>
    <span id="m-kda-wurf-badge" class="badge bamb"></span>
    <button style="background:none;border:none;color:var(--mut);font-size:24px;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center" onclick="closeM('m-kda-wurf')" aria-label="Schließen">×</button>
  </div>
  <div id="m-kda-wurf-body"></div>
  <button class="btn bp" id="m-kda-wurf-confirm" style="width:100%;margin-top:12px;opacity:.4" disabled onclick="submitKDAWurfe()">Wurf bestätigen</button>
  <button class="btn bg" style="width:100%;margin-top:8px" onclick="closeM('m-kda-wurf')">Abbrechen</button>
</div></div>

<div class="mo" id="m-bk"><div class="md">
  <h2>🖼 Bilderkegel</h2>
  <div class="fg"><label>Datum</label><input type="date" id="m-bk-datum"></div>
  <div class="fg"><label>Spieler (min. 2)</label><div id="m-bk-wahl" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
  <div style="display:flex;gap:10px;margin-top:18px">
    <button class="btn bp" style="flex:1" onclick="startBK()">Starten</button>
    <button class="btn bg" onclick="closeM('m-bk')">Abbrechen</button>
  </div>
</div></div>


<div class="mo" id="m-start-abend"><div class="md">
  <h2>Abend starten</h2>
  <div class="fg"><label>Name (optional)</label><input type="text" id="m-abend-name" placeholder="z.B. Freitagsrunde (optional)"></div>

// Auth gate + init
document.addEventListener('DOMContentLoaded', async function() {
  var authRes = await fetch('/api/auth/status');
  var auth = await authRes.json();
  if (!auth.authenticated) {
    showPINOverlay();
    return;
  }
  await init();

async function refreshPlayerStats() {
  try {
    var sd = await fetch('/api/stats').then(function(r){return r.json();});
    var statsArr = sd.players || sd;
    var stMap = {}; statsArr.forEach(function(s){ stMap[s.player_id] = s; });
    S.spieler.forEach(function(p) {
      var st = stMap[p.id] || {};
      p.spiele = (st.wins||0) + (st.losses||0) + (st.draws||0);
      p.siege = st.wins || 0;
      p.niederlagen = st.losses || 0;
      p.pudel = st.pudel_count || 0;
      p.wuerfe = st.total_throws || 0;
      p.avg_score = st.avg_score || 0;
      p.neun = st.neun_count || 0;
    });
    renderSpielerListe();
  } catch(e) {}
}

async function init() {
  var [playersRes, statsRes] = await Promise.all([fetch('/api/players'), fetch('/api/stats')]);
  S.spieler = await playersRes.json();
  var statsArr = []; try { var _sd = await statsRes.json(); statsArr = _sd.players || _sd; } catch(e) {}
  var stMap = {}; statsArr.forEach(function(s){ stMap[s.player_id] = s; });
  S.spieler.forEach(function(p) {
    var st = stMap[p.id] || {};
    p.spiele = (st.wins||0) + (st.losses||0) + (st.draws||0);
    p.siege = st.wins || 0;
    p.niederlagen = st.losses || 0;
    p.pudel = st.pudel_count || 0;
    p.wuerfe = st.total_throws || 0;
    p.avg_score = st.avg_score || 0;
    p.neun = st.neun_count || 0;
  });

  var abendRes = await fetch('/api/abende/active');
  var abendData = await abendRes.json();
  S.aktAbend = abendData ? { id: abendData.id, name: abendData.name } : null;

  var gamesRes = await fetch('/api/games?status=active');
  var activeGames = await gamesRes.json();
  if (activeGames.length) {
    var g = activeGames[0];
    var detailRes = await fetch('/api/games/' + g.id);
    var detail = await detailRes.json();
    S.aktSpiel = { gameId: g.id, state: detail.state, type_key: g.type_key };
    showTab('spielen');
  }

  initSocket();
  renderAll();

  fetch('/api/highlights/current')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      S.kdaChampionId = data.kda_champion ? data.kda_champion.id : null;
      S.bkLoserId = data.bk_loser ? data.bk_loser.id : null;
      renderSpielenTab();
    })
    .catch(function() {});
}

// PIN Overlay
function showPINOverlay() {
  var overlay = document.createElement('div');

    '<button class="btn bp" style="width:100%;margin-bottom:8px" onclick="submitPIN()">Anmelden</button>' +

async function submitPIN() {
  var pin = document.getElementById('pin-input').value;
  var res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ pin: pin })
  });
  if (res.ok) {
    document.getElementById('pin-overlay').remove();
    await init();
  } else {
    document.getElementById('pin-err').style.display = 'block';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}

// Socket.io client + connection dot + game events
function initSocket() {
  socket = io();

  var connDot = document.getElementById('connDot');
  socket.on('connect', function() { if (connDot) connDot.className = 'conn-dot green'; if (S.aktSpiel) socket.emit('join', S.aktSpiel.gameId); });
  socket.on('disconnect', function() { if (connDot) connDot.className = 'conn-dot red'; });

  socket.on('game:started', function(data) {
    S.aktSpiel = { gameId: data.gameId, state: data.state, type_key: data.type_key };
    socket.emit('join', data.gameId);
    showTab('spielen');
  });

  socket.on('throw:applied', function(data) {
    if (S.aktSpiel) S.aktSpiel.state = data.state;
    renderSpielenTab();
  });

  socket.on('undo:applied', function(data) {
    if (S.aktSpiel) S.aktSpiel.state = data.state;
    renderSpielenTab();
  });

  socket.on('game:finished', function(data) {
    var typeKey = S.aktSpiel ? S.aktSpiel.type_key : '';
    if (typeKey === 'kda') playKDATone();
    else if (typeKey === 'bilderkegel') playBKTone();
    if (S.aktSpiel && S.aktSpiel._finishing) return;
    showWinnerBanner(data.state);
    fetch('/api/highlights/current')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        S.kdaChampionId = d.kda_champion ? d.kda_champion.id : null;
        S.bkLoserId = d.bk_loser ? d.bk_loser.id : null;
      })
      .catch(function() {});
    refreshPlayerStats();
  });
}

function joinGameRoom(gameId) {

}

async function submitThrow(player_id, throw_index, value, meta) {
  var body = { player_id: player_id, throw_index: throw_index, value: value };
  if (meta !== undefined) body.meta = meta;
  var res = await fetch('/api/games/' + S.aktSpiel.gameId + '/throws', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    if (res.status === 409) { notify('Doppelter Wurf', 'var(--red)'); } else { notify('Fehler beim Wurf', 'var(--red)'); }
    return null;
  }
  return await res.json();
}

async function submitUndo() {
  if (!S.aktSpiel) return;
  var res = await fetch('/api/games/' + S.aktSpiel.gameId + '/undo', {
    method: 'POST', headers: { 'content-type': 'application/json' }
  });
  if (!res.ok) { notify('Kein Wurf zum Rueckgaengig machen', 'var(--red)'); return; }
  var data = await res.json();
  S.aktSpiel.state = data.state;
  renderSpielenTab();

// Winner banner
function getWinnerName(state, type_key) {
  if (!state) return 'Unbekannt';
  if (type_key === 'kda') { return (state.gewinner && state.gewinner.name) ? state.gewinner.name : 'Unbekannt'; }
  if (type_key === 'fuchsjagd') {
    if (!state.winner) return state.fuchs ? state.fuchs.name : 'Unbekannt';
    return state.winner === 'fuchs' ? (state.fuchs ? state.fuchs.name : 'Fuchs') : (state.sieger ? state.sieger.name : 'Jaeger');
  }
  if (type_key === 'viergewinnt') {
    if (state.winner === 'draw') return 'Unentschieden';
    if (state.winner === 'X') { return state.tX && state.tX.length ? state.tX.map(function(p){return p.name;}).join(' & ') : 'Team X'; }
    if (state.winner === 'O') { return state.tO && state.tO.length ? state.tO.map(function(p){return p.name;}).join(' & ') : 'Team O'; }
    return 'Unbekannt';
  }
  if (type_key === 'bilderkegel') {
    if (!state.players || !state.players.length) return 'Unbekannt';
    var bkPl = state.players.slice().sort(function(a,b){ var sa=a.bildPts.reduce(function(x,y){return x+(y||0);},0),sb=b.bildPts.reduce(function(x,y){return x+(y||0);},0);return sb-sa; });
    return bkPl[0].name || 'Unbekannt';
  }
  // dreiVollen, plusMinus, grosseHaus, kleineHaus, anker — all have state.players sorted by score
  if (state.players && state.players.length) {
    var pl = state.players.slice();
    if (type_key === 'kleineHaus') {
      pl.sort(function(a,b){ var va=hn(a.slots)||999,vb=hn(b.slots)||999; return va-vb; });
    } else {
      pl.sort(function(a,b){ return totPts(b, type_key) - totPts(a, type_key); });
    }
    return pl[0].name || 'Unbekannt';
  }
  return 'Unbekannt';
}

    sym.className = 'player-symbol';
    sym.setAttribute('aria-label', 'Bilderkegeln-Verlierer');
    sym.textContent = ' 💩';
    nameEl.appendChild(sym);
  }
}

function showWinnerBanner(state) {

// Game detail modal
async function showGameDetail(gameId) {
  var c = document.getElementById('m-game-det-c');
  c.innerHTML = '<div style="text-align:center;padding:24px;color:var(--mut)">Laden…</div>';
  openM('m-game-det');
  var data;
  try {
    var r = await fetch('/api/games/' + gameId);
    data = await r.json();
  } catch(e) {
    c.innerHTML = '<div style="text-align:center;padding:24px;color:var(--red)">Laden fehlgeschlagen.</div>';
    return;
  }
  var typ = S.typen.find(function(t){return t.id===data.game.type_key;});
  var typName = typ ? typ.name : data.game.type_key;
  var typIcon = typ ? typ.icon : '🎲';
  var dateStr = data.game.finished_at ? new Date(data.game.finished_at.replace(' ','T')).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) : '';
  var html = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="font-size:32px">' + typIcon + '</div><div><div style="font-family:var(--fh);font-size:22px">' + typName + '</div><div style="color:var(--mut);font-size:12px">' + dateStr + '</div></div></div>';
  if (data.game.type_key === 'viergewinnt' && data.state && data.state.grid) {
    var vgSt = data.state;
    var VGX = '#e05252', VGO = '#5b8dee';
    var winnerTeam = vgSt.winner;
    function vgTeamHtml(players, color, teamKey) {
      var won = winnerTeam === teamKey;
      var lost = winnerTeam && winnerTeam !== 'draw' && winnerTeam !== teamKey;
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
        + '<div style="font-family:var(--fh);font-size:16px;color:' + color + ';letter-spacing:.06em">TEAM ' + teamKey + (won ? ' 🏆' : '') + '</div>'
        + (players || []).map(function(p) {
            return '<div style="font-size:13px;color:' + (lost ? 'var(--mut)' : 'var(--txt)') + '">' + (p.emoji != null ? p.emoji : '') + ' ' + p.name + '</div>';
          }).join('')
        + '</div>';
    }
    var cs = 20, gap = 2, N = 9;
    var svgW = N * cs + (N - 1) * gap, svgH = N * cs + (N - 1) * gap;
    var circles = '';
    for (var vgr = 0; vgr < N; vgr++) {
      for (var vgc = 0; vgc < N; vgc++) {
        var cx = vgc * (cs + gap) + cs / 2, cy = vgr * (cs + gap) + cs / 2;
        var val = vgSt.grid[vgr] ? vgSt.grid[vgr][vgc] : null;
        var fill = val === 'X' ? VGX + 'cc' : val === 'O' ? VGO + 'cc' : '#2a2a38';
        var stroke = val === 'X' ? VGX : val === 'O' ? VGO : '#3a3a4e';
        circles += '<circle cx="' + cx + '" cy="' + cy + '" r="' + (cs / 2 - 1) + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.5"/>';
      }
    }
    var colNs = '';
    for (var vgn = 1; vgn <= N; vgn++) {
      colNs += '<div style="width:' + cs + 'px;text-align:center;font-size:9px;color:var(--mut)">' + vgn + '</div>';
    }
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      + vgTeamHtml(vgSt.tX, VGX, 'X')
      + '<div style="display:flex;flex-direction:column;align-items:center;gap:2px">'
      + '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" width="' + svgW + '" height="' + svgH + '" xmlns="http://www.w3.org/2000/svg">' + circles + '</svg>'
      + '<div style="display:flex;gap:' + gap + 'px;margin-top:2px">' + colNs + '</div>'
      + (winnerTeam === 'draw' ? '<div style="font-size:12px;color:var(--mut);margin-top:4px">Unentschieden</div>' : '')
      + '</div>'
      + vgTeamHtml(vgSt.tO, VGO, 'O')
      + '</div>';
    var vgShare = ['🎳 Pegelköpp – ' + typName];
    if (dateStr) vgShare.push('📅 ' + dateStr);
    vgShare.push('');
    if (winnerTeam === 'draw') { vgShare.push('Unentschieden!'); }
    else if (winnerTeam) {
      var vgWinPl = (winnerTeam === 'X' ? vgSt.tX : vgSt.tO) || [];
      vgShare.push('Team ' + winnerTeam + ' gewinnt! 🏆');
      vgWinPl.forEach(function(p){ vgShare.push('  ' + (p.emoji||'') + ' ' + p.name); });
    }
    var vgWaUrl = 'https://wa.me/?text=' + encodeURIComponent(vgShare.join('\n'));
    html += '<button class="btn bg sm" style="width:100%;margin-top:12px" onclick="window.open(\'' + vgWaUrl.replace(/\'/g, '%27') + '\',\'_blank\')">📤 Via WhatsApp teilen</button>';
  } else if (data.game.type_key === 'fuchsjagd' && data.state && data.state.fuchs) {
    var fjSt = data.state;

  } else {
    html += '<div style="color:var(--mut);font-size:13px;text-align:center;padding:16px">Keine Ergebnisse verfügbar.</div>';
  }
  c.innerHTML = html;
}

function startTyp(id){var st=S.typen.find(function(s){return s.id===id;});if(!st)return;if(id==='viergewinnt'){openM('m-vg');return;}if(id==='fuchsjagd'){openM('m-fj');return;}if(id==='anker'){openM('m-anker');return;}if(id==='kda'){openM('m-kda');return;}if(id==='bilderkegel'){openM('m-bk');return;}genTyp=st;genSel=[];document.getElementById('m-gen-title').textContent=st.icon+' '+st.name;document.getElementById('m-gen-datum').value=today();document.getElementById('m-gen-extra').innerHTML='';document.getElementById('m-gen-wahl').innerHTML=S.spieler.filter(function(s){return !s.archived;}).map(function(s){return'<div onclick="togGen('+s.id+',this)" style="padding:6px 12px;border-radius:20px;border:2px solid var(--brd);background:var(--bg3);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s">'+s.emoji+' '+s.name+'</div>';}).join('');openM('m-spiel-gen');}

async function startGenSpiel() {
  if (!genSel.length) { notify('Spieler waehlen', 'var(--red)'); return; }
  var res = await fetch('/api/games', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ type_key: genTyp.id, player_ids: genSel })
  });
  if (!res.ok) { notify('Fehler beim Starten', 'var(--red)'); return; }
  var data = await res.json();

  S.aktSpiel = { gameId: data.id, state: detail.state, type_key: data.type_key };
  joinGameRoom(data.id);
  closeM('m-spiel-gen');

  showTab('spielen');
}

// Helpers
function hn(slots){if(slots.h===null||slots.z===null||slots.e===null)return null;return(slots.h*100)+(slots.z*10)+slots.e;}
function pmCalc(w){if(!w||!w.length)return 0;var r=w[0];if(w.length>1)r+=w[1];if(w.length>2)r-=w[2];if(w.length>2&&r<1)r=1;if(w.length>3)r*=w[3];if(w.length>4)r=w[4]!==0?r/w[4]:r;return Math.round(r*100)/100;}
function totPts(p,stid){if(stid==='grosseHaus'||stid==='kleineHaus'){var v=hn(p.slots);return v===null?0:v;}if(stid==='plusMinus')return pmCalc(p.wuerfe);if(!p.wuerfe||!p.wuerfe.length)return 0;return p.wuerfe.reduce(function(a,b){return a+b;},0);}

async function renderSpiele() {
  var el = document.getElementById('r-spiele');

    recapCard.style.marginBottom = '16px';
    var recapTitle = document.createElement('div');

    dateRow.className = 'wi';
    var dateLeft = document.createElement('span');

    var recapDateStr = '';
    try {
      var recapD = new Date(recapEnded.replace(' ', 'T'));
      if (!isNaN(recapD.getTime())) {
        var dd = String(recapD.getDate()).padStart(2, '0');
        var mm = String(recapD.getMonth() + 1).padStart(2, '0');
        var yyyy = recapD.getFullYear();
        recapDateStr = dd + '.' + mm + '.' + yyyy;
      }
    } catch(e) {}
    dateLeft.textContent = '📅 ' + (recapDateStr || '—');
    var dateRight = document.createElement('span');
    dateRight.style.color = 'var(--mut)';
    dateRight.textContent = recapData.abend.name || '—';
    dateRow.appendChild(dateLeft);
    dateRow.appendChild(dateRight);
    recapCard.appendChild(dateRow);
    // KDA row
    var kdaRow = document.createElement('div');
    kdaRow.className = 'wi';
    var kdaLeft = document.createElement('span');
    kdaLeft.textContent = '🏆 Kegler des Abends';
    var kdaRight = document.createElement('span');
    if (recapData.kda_champion) {
      kdaRight.textContent = recapData.kda_champion.emoji + ' ' + recapData.kda_champion.name;
    } else {
      kdaRight.textContent = '—';
      kdaRight.style.color = 'var(--mut)';
    }
    kdaRow.appendChild(kdaLeft);
    kdaRow.appendChild(kdaRight);
    recapCard.appendChild(kdaRow);
    // BK row
    var bkRow = document.createElement('div');
    bkRow.className = 'wi';
    var bkLeft = document.createElement('span');
    bkLeft.textContent = '💩 BK Verlierer';
    var bkRight = document.createElement('span');
    if (recapData.bk_loser) {
      bkRight.textContent = recapData.bk_loser.emoji + ' ' + recapData.bk_loser.name;
    } else {
      bkRight.textContent = '—';
      bkRight.style.color = 'var(--mut)';
    }
    bkRow.appendChild(bkLeft);
    bkRow.appendChild(bkRight);
    recapCard.appendChild(bkRow);
    // Toggle for game list
    var recapToggle = document.createElement('div');
    recapToggle.style.cssText = 'font-size:13px;color:var(--mut);cursor:pointer;margin-top:10px;width:100%';
    recapToggle.textContent = '▼ Spiele des Abends';
    var recapPanel = document.createElement('div');
    recapPanel.style.display = 'none';

    // Toggle for player list

    recapToggle2.textContent = '▼ Spieler des Abends';
    var recapPanel2 = document.createElement('div');
    recapPanel2.style.display = 'none';
    recapToggle2.addEventListener('click', function() {

  // Fetch abende list for grouping
  var abendeMap = {};
  try {
    var abListRes = await fetch('/api/abende');
    var abList = await abListRes.json();
    abList.forEach(function(a){ abendeMap[a.id] = a; });
  } catch(e) {}

  // Fetch finished games
  var games;
  try {
    games = await fetch('/api/games?status=finished').then(function(r){return r.json();});
  } catch(e) {
    var errDiv = document.createElement('div');
    errDiv.className = 'empty';
    errDiv.innerHTML = '<div class="icon">🎳</div><p>Laden fehlgeschlagen.</p>';

    el.innerHTML = '';

    var hdr = document.createElement('div');

    hdr.textContent = text;
    return hdr;
  }

  // Group games by abend_id
  var grouped = {}; // abend_id (string) -> [game, ...]
  var ohne = [];
  games.forEach(function(g) {
    if (g.abend_id != null) {
      var key = String(g.abend_id);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(g);
    } else {
      ohne.push(g);
    }
  });

  // Render groups in order (by first game's started_at, newest group first)
  var abendIds = Object.keys(grouped);
  // Sort by first game in group descending
  abendIds.sort(function(a, b) {
    var ga = grouped[a][0], gb = grouped[b][0];
    return new Date(gb.started_at || 0) - new Date(ga.started_at || 0);
  });

  abendIds.forEach(function(abendId) {
    var abend = abendeMap[abendId];
    var headerText;
    if (abend) {
      var dateLabel = abend.started_at ? new Date(abend.started_at).toLocaleDateString('de-DE', {weekday:'short',day:'2-digit',month:'2-digit'}) : '';
      headerText = abend.name + (dateLabel ? ' (' + dateLabel + ')' : '');
    } else {
      headerText = 'Abend #' + abendId;
    }
    frag.appendChild(makeGroupHeader(headerText));
    grouped[abendId].forEach(function(g){ frag.appendChild(makeGameCard(g)); });
  });

  if (ohne.length) {
    frag.appendChild(makeGroupHeader('Ohne Abend'));
    ohne.forEach(function(g){ frag.appendChild(makeGameCard(g)); });
  }

  el.innerHTML = '';
  el.appendChild(frag);
}

    idleFrag.appendChild(idleEmpty);

      var idleTitle = document.createElement('div'); idleTitle.className = 'stitle'; idleTitle.textContent = 'Aktuelle Titelträger';
      idleCard.appendChild(idleTitle);

      if (bkSp2) { var r2=document.createElement('div');r2.className='wi';var l2=document.createElement('span');l2.textContent='💩 BK Verlierer';var v2=document.createElement('span');v2.style.color='var(--red)';v2.textContent=bkSp2.emoji+' '+bkSp2.name;r2.appendChild(l2);r2.appendChild(v2);idleCard.appendChild(r2); }
      idleFrag.appendChild(idleCard);
    }
    el.innerHTML = ''; el.appendChild(idleFrag); return;
  }
  switch (S.aktSpiel.type_key) {
    case 'viergewinnt':  renderVGSpiel(el, S.aktSpiel.state); break;
    case 'fuchsjagd':   renderFJSpiel(el, S.aktSpiel.state); break;
    case 'anker':       renderAnkerSpiel(el, S.aktSpiel.state); break;
    case 'kda':         renderKDASpiel(el, S.aktSpiel.state); break;
    case 'bilderkegel': renderBKSpiel(el, S.aktSpiel.state); break;
    default:            renderNSpiel(el, S.aktSpiel.state); break;
  }
  // Append undo button after sub-renderer (only when game is still active)
  if (S.aktSpiel.state && !S.aktSpiel.state.done) {
    var undoDiv = document.createElement('div');
    undoDiv.style.cssText = 'padding:0 0 8px';
    var undoBtn = document.createElement('button');
    undoBtn.className = 'btn bg';
    undoBtn.textContent = '↩ Rückgängig';
    undoBtn.style.cssText = 'width:100%;color:var(--mut)';
    undoBtn.onclick = submitUndo;
    undoDiv.appendChild(undoBtn);
    el.appendChild(undoDiv);
  }
}

// Round label lookup (UI-SPEC copywriting contract)
function kdaRoundLabel(slotId) {
  var map = {
    'W-R1': 'W · Runde 1', 'W-R2': 'W · Runde 2', 'W-R3': 'W · Runde 3',
    'W-Semi': 'W · Halbfinale', 'W-Final': 'W · Finale',
    'L-R1': 'L · Runde 1', 'L-R2': 'L · Runde 2', 'L-R3': 'L · Runde 3',
    'L-Semi': 'L · Halbfinale', 'L-Final': 'L · Finale',
    'GF': 'Großes Finale'
  };
  // Extract prefix from slot id e.g. 'W-R1-1' -> 'W-R1', 'GF-1' -> 'GF'
  if (!slotId) return '';
  var parts = slotId.split('-');
  var key;
  if (parts[0] === 'GF') {
    key = 'GF';
  } else if (parts.length >= 3) {
    key = parts[0] + '-' + parts[1];
  } else {
    key = slotId;
  }
  return map[key] || key;
}

// Build a single bracket slot DOM element — uses textContent only (XSS guard)
function buildBracketSlotEl(slot) {
  var div = document.createElement('div');
  div.className = 'bracket-slot' + (slot.isBye ? ' bye' : '') + (!slot.done && !slot.isBye && slot.p1 && slot.p2 ? ' active' : '');

  if (slot.isBye) {
    div.setAttribute('aria-label', 'Freilos — ' + (slot.winner ? slot.winner.name : '—'));
  } else if (!slot.done && !slot.isBye && slot.p1 && slot.p2) {
    div.setAttribute('role', 'button');
    div.setAttribute('tabindex', '0');
    div.setAttribute('aria-label', slot.p1.name + ' vs ' + slot.p2.name + ' — Jetzt spielen');
    div.setAttribute('data-slot-id', slot.id);
    div.onclick = (function(sid) { return function() { openKDAWurfModal(sid); }; })(slot.id);
    div.onkeydown = (function(sid) { return function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openKDAWurfModal(sid); } }; })(slot.id);
  } else if (slot.done) {
    var p1IsWinner = slot.winner && slot.p1 && slot.winner.id === slot.p1.id;
    div.setAttribute('aria-label', (slot.winner ? slot.winner.name : '—') + ' hat gewonnen');
  }

  var players = [slot.p1, slot.p2];
  players.forEach(function(p, idx) {
    var isWinner = slot.done && slot.winner && p && slot.winner.id === p.id;
    var isLoser = slot.done && slot.loser && p && slot.loser.id === p.id;

    var row = document.createElement('div');
    row.className = 'bracket-player-row' + (isWinner ? ' winner-row' : '') + (isLoser ? ' loser-row' : '');

    var nameSpan = document.createElement('span');
    nameSpan.className = 'bracket-player-name';
    if (p) {
      nameSpan.textContent = p.emoji + ' ' + p.name;
      nameSpan.style.color = isLoser ? 'var(--mut)' : 'var(--txt)';
      appendSymbol(nameSpan, p.id);
    } else {
      nameSpan.textContent = '—';
      nameSpan.style.color = 'var(--mut)';
    }

    var scoreSpan = document.createElement('span');
    scoreSpan.className = 'bracket-player-score';
    if (p && slot.throws && slot.throws.length > 0) {
      var pThrows = slot.throws.filter(function(t) { return t.playerId === p.id; });
      var total = pThrows.reduce(function(s, t) { return s + t.value; }, 0);
      if (pThrows.length > 0) {
        var scoreText = String(total);
        if (!slot.done) { scoreText += ' ⚫'; }
        scoreSpan.textContent = scoreText;
        scoreSpan.style.color = isWinner ? 'var(--grn)' : isLoser ? 'var(--mut)' : 'var(--ac)';
      } else {
        scoreSpan.textContent = '—';
        scoreSpan.style.color = 'var(--mut)';
      }
    } else {
      scoreSpan.textContent = '—';
      scoreSpan.style.color = 'var(--mut)';
    }

    row.appendChild(nameSpan);
    row.appendChild(scoreSpan);
    div.appendChild(row);

    // Divider between rows for done slots
    if (idx === 0 && slot.done) {
      var divider = document.createElement('div');
      divider.className = 'bracket-slot-divider';
      div.appendChild(divider);
    }
  });

  return div;
}

// Build bracket columns grouped by round for a given bracket type ('W' or 'L')
function buildBracketColumns(slots, bracketType) {
  var bracketSlots = slots.filter(function(s) { return s.bracket === bracketType; });
  // Group by round
  var roundMap = {};
  var roundOrder = [];
  bracketSlots.forEach(function(s) {
    var r = s.round != null ? s.round : 0;
    if (!roundMap[r]) { roundMap[r] = []; roundOrder.push(r); }
    roundMap[r].push(s);
  });
  roundOrder.sort(function(a, b) { return a - b; });

  var colsDiv = document.createElement('div');
  colsDiv.className = 'bracket-cols';

  roundOrder.forEach(function(r) {
    var colDiv = document.createElement('div');
    colDiv.className = 'bracket-col';

    // Round label (derive from first slot id in this round)
    var firstSlot = roundMap[r][0];
    var labelDiv = document.createElement('div');
    labelDiv.className = 'bracket-round-label';
    labelDiv.textContent = kdaRoundLabel(firstSlot.id);
    colDiv.appendChild(labelDiv);

    roundMap[r].forEach(function(slot) {
      colDiv.appendChild(buildBracketSlotEl(slot));
    });
    colsDiv.appendChild(colDiv);
  });
  return colsDiv;
}

// Module-level state for throw modal
var kdaWurfSlotId = null;

// Count how many throws a player has made across ALL bracket slots (game-wide index).
// The DB UNIQUE constraint is (game_id, player_id, throw_index) — not per-match.
function kdaPlayerThrowCount(bracket, playerId) {
  var count = 0;
  bracket.forEach(function(s) {
    if (s.throws) s.throws.forEach(function(t) { if (t.playerId === playerId) count++; });
  });
  return count;
}

function openKDAWurfModal(slotId) {

  var slot = S.aktSpiel.state.bracket.find(function(s) { return s.id === slotId; });
  if (!slot) return;

  // Set title
  var titleEl = document.getElementById('m-kda-wurf-title');

  }

  if (badgeEl) {
    badgeEl.className = 'badge ' + (slot.bracket === 'W' ? 'bgrn' : 'bamb');
    badgeEl.textContent = slot.bracket === 'W' ? 'Winner Bracket' : slot.bracket === 'L' ? 'Loser Bracket' : 'Großes Finale';
  }

  kdaWurfSlotId = slotId;
  kdaWurfVals = {};
  kdaWurfKeinPudel = {};
  renderKDAWurfBody();
  openM('m-kda-wurf');
}

function renderKDAWurfBody() {
  var bodyEl = document.getElementById('m-kda-wurf-body');
  if (!bodyEl || !S.aktSpiel || !S.aktSpiel.state || !S.aktSpiel.state.bracket) return;
  var slot = S.aktSpiel.state.bracket.find(function(s) { return s.id === kdaWurfSlotId; });
  if (!slot) return;

  var isGF = slot.bracket === 'GF';
  var throwsPerPlayer = isGF ? 2 : 1;

  // Update confirm button label
  var confirmBtn = document.getElementById('m-kda-wurf-confirm');
  if (confirmBtn) {
    confirmBtn.textContent = slot.tiebreak ? 'Stechwurf bestätigen' : (isGF ? 'Würfe bestätigen' : 'Wurf bestätigen');
  }

  bodyEl.replaceChildren();

  // Tiebreak section header (shown above player grids when tiebreak is active)
  if (slot.tiebreak) {
    var tbHeader = document.createElement('div');
    tbHeader.className = 'kda-wurf-tiebreak-header';
    tbHeader.textContent = 'Stechen — Gleichstand!';
    bodyEl.appendChild(tbHeader);
  }

  var players = [slot.p1, slot.p2].filter(Boolean);
  players.forEach(function(p) {
    var section = document.createElement('div');
    section.className = 'kda-wurf-player-section';

    var avatar = document.createElement('div');
    avatar.className = 'kda-wurf-avatar';
    avatar.textContent = p.emoji;

    var nameDiv = document.createElement('div');
    nameDiv.className = 'kda-wurf-player-name';
    nameDiv.textContent = p.name;

    section.appendChild(avatar);
    section.appendChild(nameDiv);

    for (var ti = 0; ti < throwsPerPlayer; ti++) {
      var throwIdx = ti;
      var key = p.id + '-' + throwIdx;

      if (isGF) {
        var throwLabel = document.createElement('div');
        throwLabel.className = 'kda-wurf-throw-label';
        throwLabel.textContent = 'Wurf ' + (throwIdx + 1);
        section.appendChild(throwLabel);
      }

      var grid = document.createElement('div');
      grid.className = 'kgrid';
      grid.setAttribute('role', 'group');
      grid.setAttribute('aria-label', 'Pins für ' + p.name);

      for (var v = 0; v <= 9; v++) {
        var btn = document.createElement('button');
        var isPudelSel = v === 0 && kdaWurfVals[key] === 0 && !kdaWurfKeinPudel[key];
        var isNormalSel = v !== 0 && kdaWurfVals[key] === v;
        btn.className = 'kb' + (v === 0 ? ' pudel' : '') + (isPudelSel || isNormalSel ? ' sel' : '');
        btn.textContent = v === 0 ? 'P' : String(v);
        btn.setAttribute('type', 'button');
        (function(pid, tidx, val) {
          btn.onclick = function() { kdaSelPin(pid, tidx, val); };
        })(p.id, throwIdx, v);
        grid.appendChild(btn);
      }
      section.appendChild(grid);

      // "0 (kein Pudel)" button — mirrors kgrid() pattern
      var kpSel = kdaWurfVals[key] === 0 && kdaWurfKeinPudel[key];
      var kpBtn = document.createElement('button');
      kpBtn.setAttribute('type', 'button');
      kpBtn.textContent = '0 (kein Pudel)';
      kpBtn.style.cssText = 'display:block;width:100%;margin-top:4px;padding:5px;border-radius:8px;border:1px solid ' + (kpSel ? 'var(--ac)' : 'var(--brd)') + ';background:' + (kpSel ? 'var(--ac)22' : 'var(--bg3)') + ';color:' + (kpSel ? 'var(--ac)' : 'var(--mut)') + ';font-size:12px;font-weight:600;cursor:pointer;text-align:center';
      (function(pid, tidx) {
        kpBtn.onclick = function() { kdaSelKeinPudel(pid, tidx); };
      })(p.id, throwIdx);
      section.appendChild(kpBtn);
    }

    // Running total for GF
    if (isGF) {
      var total = 0;
      for (var ti2 = 0; ti2 < throwsPerPlayer; ti2++) {
        var k = p.id + '-' + ti2;
        if (kdaWurfVals[k] !== undefined) total += kdaWurfVals[k];
      }
      var totalDiv = document.createElement('div');
      totalDiv.className = 'kda-wurf-total';
      totalDiv.textContent = 'Gesamt: ' + total;
      section.appendChild(totalDiv);
    }

    bodyEl.appendChild(section);
  });

  // Update confirm button enabled state
  var allSelected = allKDAPinsSelected(slot);
  if (confirmBtn) {
    confirmBtn.disabled = !allSelected;
    confirmBtn.style.opacity = allSelected ? '1' : '.4';
  }
}

function kdaSelPin(playerId, throwIdx, value) {
  kdaWurfVals[playerId + '-' + throwIdx] = value;
  if (value !== 0) kdaWurfKeinPudel[playerId + '-' + throwIdx] = false;
  renderKDAWurfBody();
}

function kdaSelKeinPudel(playerId, throwIdx) {
  kdaWurfVals[playerId + '-' + throwIdx] = 0;
  kdaWurfKeinPudel[playerId + '-' + throwIdx] = true;
  renderKDAWurfBody();
}

function allKDAPinsSelected(slot) {
  if (!slot || !slot.p1 || !slot.p2) return false;
  var isGF = slot.bracket === 'GF';
  var throwsPerPlayer = isGF ? 2 : 1;
  var players = [slot.p1, slot.p2];
  for (var i = 0; i < players.length; i++) {
    for (var t = 0; t < throwsPerPlayer; t++) {
      if (kdaWurfVals[players[i].id + '-' + t] === undefined) return false;
    }
  }
  return true;
}

async function submitKDAWurfe() {
  if (!S.aktSpiel || !S.aktSpiel.state || !S.aktSpiel.state.bracket) return;
  var slot = S.aktSpiel.state.bracket.find(function(s) { return s.id === kdaWurfSlotId; });
  if (!slot || !slot.p1 || !slot.p2) return;

  var isGF = slot.bracket === 'GF';
  var throwsPerPlayer = isGF ? 2 : 1;

  // Build ordered throw list: interleaved p1/p2 for GF, sequential for normal matches.
  // throw_index = GAME-WIDE per-player count (DB UNIQUE on game_id, player_id, throw_index).
  var throwList = [];
  var players = [slot.p1, slot.p2];
  for (var t = 0; t < throwsPerPlayer; t++) {
    for (var i = 0; i < players.length; i++) {
      var p = players[i];
      var val = kdaWurfVals[p.id + '-' + t];
      if (val !== undefined) {
        var kp = kdaWurfKeinPudel[p.id + '-' + t];
        throwList.push({ playerId: p.id, value: val, meta: (val === 0 && kp) ? { keinPudel: true } : undefined });
      }
    }
  }

  for (var j = 0; j < throwList.length; j++) {
    var entry = throwList[j];
    // Re-read count from current state after each submitThrow updates S.aktSpiel.state
    var throwIndex = kdaPlayerThrowCount(S.aktSpiel.state.bracket, entry.playerId);
    var data = await submitThrow(entry.playerId, throwIndex, entry.value, entry.meta);
    if (!data) return;
    S.aktSpiel.state = data.state;
    if (data.finished) {
      closeM('m-kda-wurf');
      handleGameFinished(data.state);
      return;
    }
    renderSpielenTab();
  }

  closeM('m-kda-wurf');
}

    frag.appendChild(card);
  });
  el.innerHTML = '';
  el.appendChild(frag);
}

async function addCustomTyp() {
  var name = document.getElementById('m-typ-name').value.trim();
  if (!name) { notify('Name eingeben', 'var(--red)'); return; }
  var desc = document.getElementById('m-typ-desc').value.trim();
  var res = await fetch('/api/game-types', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ name: name, description: desc || null })
  });
  if (res.status === 409) { notify('Dieser Name existiert bereits', 'var(--red)'); return; }
  if (!res.ok) { notify('Fehler', 'var(--red)'); return; }
  closeM('m-neu-typ');
  renderBib().catch(function(){});
}

async function delCustomTyp(id) {
  if (!confirm('Spieltyp löschen?')) return;
  var res = await fetch('/api/game-types/' + id, { method: 'DELETE' });
  if (!res.ok) { notify('Fehler', 'var(--red)'); return; }
  renderBib().catch(function(){});
}

function renderAll(){renderSpiele().catch(function(){}); renderSpielerListe(); renderSpielenTab(); renderBib().catch(function(){}); renderStats().catch(function(){});}
window.addEventListener('load', function() {
  document.querySelectorAll('.mo').forEach(function(m) {
    m.addEventListener('click', function(e) { if (e.target === m) m.classList.remove('open'); });
  });

  // Feedback / Bug-Melder
  document.getElementById('fb-btn').addEventListener('click', function() {
    document.getElementById('m-fb').classList.add('open');
    document.getElementById('fb-msg').value = '';
    document.getElementById('fb-status').textContent = '';
  });
  document.getElementById('fb-cancel').addEventListener('click', function() {
    document.getElementById('m-fb').classList.remove('open');
  });
  document.getElementById('fb-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var msg = document.getElementById('fb-msg').value.trim();
    if (!msg) return;
    var btn = document.getElementById('fb-send');
    btn.disabled = true;
    try {
      var r = await fetch('/api/feedback', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ message: msg }) });
      if (r.ok) {
        document.getElementById('fb-status').textContent = 'Danke! Feedback gesendet.';
        document.getElementById('fb-msg').value = '';
        setTimeout(function() { document.getElementById('m-fb').classList.remove('open'); }, 1200);
      } else {
        document.getElementById('fb-status').textContent = 'Fehler beim Senden.';
      }
    } catch(err) {
      document.getElementById('fb-status').textContent = 'Netzwerkfehler.';
    }
    btn.disabled = false;
  });
});

</script>

<button id="fb-btn" title="Bug melden">🐛</button>

<div class="mo" id="m-fb">
  <div class="md">
    <h2>Bug melden</h2>
    <form id="fb-form">
      <textarea id="fb-msg" rows="5" placeholder="Was ist passiert? (Was hast du getan, was ist schiefgelaufen?)" style="resize:vertical"></textarea>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button type="button" id="fb-cancel" class="btn bg" style="flex:1">Abbrechen</button>
        <button type="submit" id="fb-send" class="btn bp" style="flex:2">Senden</button>
      </div>
      <div id="fb-status" style="margin-top:10px;font-size:13px;color:var(--grn);text-align:center"></div>
    </form>
  </div>
</div>
</body>
